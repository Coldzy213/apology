<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry, Jai</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #D4537E;
    --rose-light: #FBEAF0;
    --rose-pale: #F4C0D1;
    --coral: #D85A30;
    --coral-pale: #FAECE7;
    --cream: #fdf8f3;
    --ink: #2C1A12;
    --muted: #8a6d5e;
    --gold: #BA7517;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Karla', sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
    cursor: default;
  }

  /* === FLOATING PETALS === */
  .petal-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    width: 10px;
    height: 14px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* === HERO === */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 2rem;
    z-index: 1;
  }

  .hero-ring {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 3rem;
  }

  .hero-ring svg {
    position: absolute;
    inset: 0;
    animation: spin 18s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hero-heart {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    animation: heartbeat 2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.15); }
    28% { transform: scale(1); }
    42% { transform: scale(1.08); }
    70% { transform: scale(1); }
  }

  .eyebrow {
    font-family: 'Karla', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 1.2rem;
    opacity: 0;
    animation: fadeUp 1s 0.3s ease forwards;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 1s 0.6s ease forwards;
  }

  .hero-title em {
    font-style: italic;
    color: var(--rose);
  }

  .hero-sub {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--muted);
    max-width: 420px;
    line-height: 1.8;
    margin-top: 1.5rem;
    opacity: 0;
    animation: fadeUp 1s 0.9s ease forwards;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 1.8s ease forwards;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--rose-pale), transparent);
    animation: scrollGrow 2s 2s ease-in-out infinite;
  }

  @keyframes scrollGrow {
    0%, 100% { transform: scaleY(1); opacity: 0.5; }
    50% { transform: scaleY(1.4); opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === SECTIONS === */
  .section {
    position: relative;
    z-index: 1;
    padding: 5rem 2rem;
    max-width: 900px;
    margin: 0 auto;
  }

  /* === APOLOGY CARDS === */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .apo-card {
    background: white;
    border: 1px solid var(--rose-pale);
    border-radius: 20px;
    padding: 2rem 1.75rem;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(40px);
    transition: transform 0.6s ease, box-shadow 0.3s ease;
  }

  .apo-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .apo-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(212, 83, 126, 0.12);
  }

  .apo-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rose-pale), var(--rose), var(--coral));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .apo-card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    display: block;
    animation: wobble 3s ease-in-out infinite;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  .card-icon:nth-child(odd) { animation-delay: 0.5s; }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.6rem;
  }

  .card-body {
    font-size: 0.92rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.75;
  }

  /* === LETTER === */
  .letter-wrap {
    background: white;
    border: 1px solid var(--rose-pale);
    border-radius: 24px;
    padding: 3.5rem 4rem;
    position: relative;
    box-shadow: 0 8px 60px rgba(212, 83, 126, 0.06);
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .letter-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 600px) {
    .letter-wrap { padding: 2rem 1.5rem; }
  }

  .letter-stamp {
    position: absolute;
    top: 2rem; right: 2.5rem;
    width: 60px; height: 70px;
    border: 2px solid var(--rose-pale);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    animation: stampRock 4s ease-in-out infinite;
  }

  @keyframes stampRock {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  .letter-salutation {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
    color: var(--rose);
    margin-bottom: 1.5rem;
  }

  .letter-body p {
    font-size: 1rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.9;
    margin-bottom: 1.25rem;
  }

  .letter-sign {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    margin-top: 2rem;
  }

  /* === QUOTE === */
  .quote-block {
    text-align: center;
    padding: 5rem 2rem;
    position: relative;
    z-index: 1;
  }

  .quote-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 8rem;
    color: var(--rose-pale);
    line-height: 0.5;
    margin-bottom: 1rem;
    display: block;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    max-width: 680px;
    margin: 0 auto 1.5rem;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 1s ease, transform 1s ease;
    transform: translateY(20px);
  }

  .quote-text.visible { opacity: 1; transform: translateY(0); }

  .quote-author {
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* === PROMISE === */
  .promise-section {
    background: linear-gradient(135deg, #fff5f7 0%, #fff8f2 100%);
    border-top: 1px solid var(--rose-pale);
    border-bottom: 1px solid var(--rose-pale);
    padding: 5rem 2rem;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .promise-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--ink);
    margin-bottom: 2.5rem;
  }

  .promise-list {
    list-style: none;
    max-width: 500px;
    margin: 0 auto 3rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .promise-list li {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.97rem;
    font-weight: 300;
    color: var(--muted);
    text-align: left;
    opacity: 0;
    transform: translateX(-20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .promise-list li.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .promise-check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--rose-light);
    border: 1.5px solid var(--rose-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.8rem;
    color: var(--rose);
  }

  /* === BUTTON === */
  .cta-btn {
    display: inline-block;
    padding: 1rem 2.5rem;
    background: var(--rose);
    color: white;
    font-family: 'Karla', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .cta-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 8px 30px rgba(212, 83, 126, 0.35);
  }

  .cta-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .cta-btn:hover::after { transform: translateX(0); }

  /* === FOOTER === */
  .footer {
    text-align: center;
    padding: 4rem 2rem;
    position: relative;
    z-index: 1;
  }

  .footer-heart {
    font-size: 2rem;
    display: block;
    margin-bottom: 1rem;
    animation: heartbeat 2s ease-in-out infinite;
  }

  .footer p {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* === SECTION HEADING === */
  .section-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 0.75rem;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 300;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }

  .section-sub {
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--muted);
    max-width: 480px;
  }

  /* === TYPEWRITER === */
  .typewriter-wrap {
    text-align: center;
    padding: 5rem 2rem;
    position: relative;
    z-index: 1;
  }

  #typewriter {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    font-weight: 300;
    font-style: italic;
    color: var(--rose);
    border-right: 2px solid var(--rose);
    padding-right: 4px;
    display: inline-block;
    min-height: 2.5rem;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { border-color: var(--rose); }
    50% { border-color: transparent; }
  }

  /* === CONFETTI BURST === */
  .confetti-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    margin-top: 3rem;
  }

  .confetti-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
  }

  .burst-active .confetti-dot {
    animation: burst 1s ease-out forwards;
  }

  @keyframes burst {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: var(--tx, 60px) var(--ty, -80px) scale(0); opacity: 0; }
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 1px;
    background: var(--rose-pale);
    margin: 1.5rem 0;
  }
</style>
</head>
<body>

<!-- Floating petals -->
<div class="petal-canvas" id="petalCanvas"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-ring">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="90" stroke="#F4C0D1" stroke-width="1" stroke-dasharray="8 6" />
      <circle cx="100" cy="100" r="75" stroke="#FAECE7" stroke-width="0.5" />
    </svg>
    <div class="hero-heart">🌸</div>
  </div>
  <h1 class="hero-title"><br><em>Sorry</em> Jai</h1>
  <!-- <p class="hero-sub">These are the hardest words to say, but you deserve to hear them. This is me, saying them to you — wholeheartedly, Jai.</p>
  <div class="scroll-hint">
    <div class="scroll-line"></div>
  </div> -->
</section>

<!-- TYPEWRITER PHRASES -->
<div class="typewriter-wrap">
  <p class="section-eyebrow" style="text-align:center">From the heart</p>
  <div id="typewriter"></div>
</div>

<!-- QUOTES -->
<div class="quote-block">
  <span class="quote-mark">"</span>
  <p class="quote-text" id="quoteText">The most beautiful apology is changed behavior, not just words.</p>
  <p class="quote-author">— on making it right</p>
</div>


<!-- LETTER -->
<!-- <section class="section">
  <p class="section-eyebrow">A letter to you</p>
  <h2 class="section-title">Written from somewhere<br>real inside me</h2>
  <div class="divider"></div>
  <div class="letter-wrap" id="letter">
    <div class="letter-stamp">💌</div>
    <p class="letter-salutation">Dear Jai,</p>
    <div class="letter-body">
      <p>I've been thinking about how to say this properly — and I've come to realize that there is no "perfect" version. There is only the honest one. So here it is, Jai.</p>
      <p>I'm sorry. Not because it's expected, not to smooth things over, but because I genuinely regret the way things unfolded and the pain it caused you. You didn't deserve that, Jai.</p>
      <p>I know words alone don't undo anything. I know that trust, once rattled, needs time to find its footing again. I'm not asking you to forgive me right now. I'm just asking you to know: I see it. I mean it. And I care deeply about making it right — with you, Jai.</p>
      <p>You matter to me — more than my pride, more than being right, more than any moment of foolishness that brought us here. That will never change.</p>
    </div>
    <p class="letter-sign">With all sincerity, always ♡</p>
  </div>
</section> -->

<!-- PROMISES -->
<div class="promise-section">
  <!-- <h2 class="promise-title">My promises to you, Jai</h2>
  <ul class="promise-list" id="promiseList">
    <li><span class="promise-check">♡</span> To listen more, and speak less carelessly</li>
    <li><span class="promise-check">♡</span> To be more mindful of how my words land</li>
    <li><span class="promise-check">♡</span> To check in, not just when it's convenient</li>
    <li><span class="promise-check">♡</span> To show up when it matters — especially then</li>
    <li><span class="promise-check">♡</span> To never let my ego get in the way of us</li>
    <li><span class="promise-check">♡</span> To keep choosing this — whatever "this" is to you</li>
  </ul> -->
  <div class="confetti-wrap" id="confettiWrap">
    <button class="cta-btn" onclick="acceptApology()">Accept with grace 🌸</button>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <span class="footer-heart">🌷</span>
  <p>Made for Jai, with a whole lot of love and a little bit of courage.</p>
  <p style="margin-top:0.5rem; font-size:0.78rem; opacity:0.6;">Because some things are worth fighting for.</p>
</footer>

<script>
  /* === PETALS === */
  const canvas = document.getElementById('petalCanvas');
  const colors = ['#F4C0D1','#FAECE7','#F0997B','#ED93B1','#fde8ee','#fce4ec'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.width = (7 + Math.random() * 8) + 'px';
    p.style.height = (10 + Math.random() * 10) + 'px';
    canvas.appendChild(p);
  }

  /* === TYPEWRITER === */
  const phrases = [
    "Jai, sorry kaayo.",
    "Pasensya na nakatug ko, Jai.",
    "Mo bawi rako nimo."
  ];
  let pi = 0, ci = 0, deleting = false;
  const tw = document.getElementById('typewriter');

  function type() {
    const phrase = phrases[pi];
    if (!deleting) {
      tw.textContent = phrase.slice(0, ++ci);
      if (ci === phrase.length) { deleting = true; setTimeout(type, 1800); return; }
    } else {
      tw.textContent = phrase.slice(0, --ci);
      if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; }
    }
    setTimeout(type, deleting ? 40 : 70);
  }
  setTimeout(type, 600);

  /* === SCROLL ANIMATIONS === */
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        if (e.target.classList.contains('promise-list')) {
          e.target.querySelectorAll('li').forEach((li, i) => {
            setTimeout(() => li.classList.add('visible'), i * 120);
          });
        } else {
          e.target.classList.add('visible');
        }
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.apo-card, .letter-wrap, .quote-text, #promiseList').forEach(el => {
    io.observe(el);
  });

  document.querySelectorAll('.apo-card').forEach((card, i) => {
    card.style.transitionDelay = (i * 0.1) + 's';
  });

  /* === CONFETTI BURST === */
  function acceptApology() {
    const wrap = document.getElementById('confettiWrap');
    const dotColors = ['#D4537E','#D85A30','#BA7517','#ed93b1','#F4C0D1','#fde8ee'];
    for (let i = 0; i < 20; i++) {
      const dot = document.createElement('div');
      dot.className = 'confetti-dot';
      const angle = (i / 20) * Math.PI * 2;
      const dist = 60 + Math.random() * 60;
      dot.style.setProperty('--tx', `translateX(${Math.cos(angle)*dist}px)`);
      dot.style.setProperty('--ty', `translateY(${Math.sin(angle)*dist - 60}px)`);
      dot.style.background = dotColors[i % dotColors.length];
      dot.style.animationDelay = Math.random() * 0.2 + 's';
      wrap.appendChild(dot);
    }
    wrap.classList.add('burst-active');
    setTimeout(() => {
      wrap.innerHTML = `<p style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;font-style:italic;color:#D4537E">Thank you, Jai. That means everything. 🌸</p>`;
    }, 900);
  }

  /* === ROTATING QUOTES === */
  const quotes = [
    "The most beautiful apology is changed behavior, not just words.",
    "Saying sorry is not a weakness — it is the strength of someone who values another more than their pride.",
    "Forgiveness does not erase the past, but it does enlarge the future.",
    "An apology is a lovely perfume; it can transform the clumsiest moment into a gracious gift.",
    "The only correct response to a heartfelt sorry is grace — if not now, then someday."
  ];
  let qi = 0;
  const qEl = document.getElementById('quoteText');
  setInterval(() => {
    qEl.style.opacity = 0;
    qEl.style.transform = 'translateY(10px)';
    setTimeout(() => {
      qi = (qi + 1) % quotes.length;
      qEl.textContent = quotes[qi];
      qEl.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
      qEl.style.opacity = 1;
      qEl.style.transform = 'translateY(0)';
    }, 500);
  }, 5000);
</script>
</body>
</html>
